# heraldstack-mcp registry.yaml
# Master launcher index for all HeraldStack MCP tooling.
# Source of truth: replaces scattered ~/mcp-launchers/*.sh metadata.
#
# Fields:
#   name:           canonical server key (matches .mcp.json server key)
#   description:    one-line purpose
#   launcher:       path relative to heraldstack-mcp repo root
#   runtime:        docker | npx | uvx | node | sshfs+npx | dispatcher | broken
#   image:          docker image or npm package (omit for node/uvx)
#   baked:          true = local tagged image; false = registry pull; null = N/A
#   session_wired:  platforms auto-loading this server (shannon | haunting | gander)
#   env_required:   env var keys sourced from ~/mcp-launchers/.env or host env
#   status:         active | broken | unwired | deprecated
#   notes:          operational context, known issues, build requirements

# ---------------------------------------------------------------------------
# CORE — wired across all platforms
# ---------------------------------------------------------------------------

- name: github
  description: "GitHub API MCP — issues, PRs, branches, code search, reviews"
  launcher: launchers/core/github.sh
  runtime: docker
  image: ghcr.io/github/github-mcp-server
  baked: false
  session_wired:
    - shannon
    - haunting
    - gander
  env_required:
    - GITHUB_PERSONAL_ACCESS_TOKEN
  status: active
  notes: >
    3-process chain: bash -> python3 github-wrapper.py -> docker run ghcr.io/github/github-mcp-server.
    github-wrapper.py manages container lifecycle and token injection.
    Pre-pull image at session start to avoid cold-start latency.
    Token resolved from gh CLI (gh auth token) with fallback to GITHUB_PERSONAL_ACCESS_TOKEN.

- name: context7
  description: "Context7 library documentation MCP — real-time SDK and framework docs"
  launcher: launchers/core/context7.sh
  runtime: npx
  image: "@upstash/context7-mcp"
  baked: false
  session_wired:
    - shannon
    - haunting
    - gander
  env_required:
    - CLIENT_IP_ENCRYPTION_KEY
  status: active
  notes: >
    Uses npx --prefer-offline to avoid network calls when cached.
    Requires nvm-managed Node at /home/bryanchasko/.nvm/versions/node/v24.14.0/bin.
    CLIENT_IP_ENCRYPTION_KEY sourced from ~/mcp-launchers/.env.

