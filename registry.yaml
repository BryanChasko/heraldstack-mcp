  container_name: heraldstack-cache-proxy
  transport:
    http: "http://localhost:8200"
  notes: >
    Intercepts qdrant-find calls across all 7 collections, checks valkey cache first.
    Invalidates cache on qdrant-store. Routes by path prefix to backend MCP servers.
    All collections accessible via http://localhost:8200/{collection}/mcp.
    128MB memory limit. 3.6MB rust binary (tokio + axum + reqwest + redis).

